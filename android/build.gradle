plugins {
    id 'com.android.application'
}

android {
    compileSdk 34

    defaultConfig {
        applicationId "com.craft3d.game"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    sourceSets {
        main {
            assets.srcDirs = ['../core/src/main/assets']   // ресурсы из core
            java.srcDirs = ['src/main/java']
        }
    }
}

dependencies {
    implementation project(':core')
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
